<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHFX👻 | PRECISION HUD</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #050505; color: #0f0; font-family: 'Share Tech Mono', monospace; padding: 10px; text-align: center; }
        .container { border: 1px solid #0f0; padding: 25px; width: 95%; margin: auto; background: rgba(0, 10, 0, 0.9); }
        .banner { width: 100%; margin-bottom: 20px; }
        .currency-box { border: 1px solid #222; padding: 20px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.6); }
        .price-display { font-size: 2.2em; margin: 10px 0; color: #0f0; min-height: 1.2em; }
        .arrow-indicator { display: inline-block; margin-left: 10px; font-weight: bold; }
        .locked-short { border: 2px solid #f00 !important; }
        .locked-long { border: 2px solid #0f0 !important; }
        .exit-data { font-size: 0.8em; color: #fff; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="banner.jpg" class="banner" alt="ARCHFX👻 | HUD">
        <button onclick="updateDashboard()">FORCE REFRESH</button>
        <div id="pairs-container">
            <div class="currency-box" id="box-eur">
                <div class="symbol-name">EUR/GBP</div>
                <div id="price-eur" class="price-display">-- <span id="arrow-eur" class="arrow-indicator"></span></div>
                <div class="exit-data" id="exits-eur"></div>
            </div>
            <div class="currency-box" id="box-usd">
                <div class="symbol-name">USD/CHF</div>
                <div id="price-usd" class="price-display">-- <span id="arrow-usd" class="arrow-indicator"></span></div>
                <div class="exit-data" id="exits-usd"></div>
            </div>
            <div class="currency-box" id="box-nzd">
                <div class="symbol-name">NZD/USD</div>
                <div id="price-nzd" class="price-display">-- <span id="arrow-nzd" class="arrow-indicator"></span></div>
                <div class="exit-data" id="exits-nzd"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = '5c69a9ca120143c299f38f521ac9a999';
        const vol = 0.001; 
        let priceMemory = {};

        async function fetchAndCalculate(pair) {
            try {
                const res = await fetch(`https://api.twelvedata.com/quote?symbol=${pair.sym}&apikey=${apiKey}`);
                const data = await res.json();
                
                if (data.close) {
                    const p = parseFloat(data.close);
                    const arrowEl = document.getElementById(`arrow-${pair.short}`);
                    
                    // Logic: If we have history, calculate movement
                    if (priceMemory[pair.short]) {
                        const diff = (p - priceMemory[pair.short]) * 10000; 
                        const symbol = p >= priceMemory[pair.short] ? "▲" : "▼";
                        const color = p >= priceMemory[pair.short] ? "#0f0" : "#f00";
                        const size = Math.min(1 + Math.abs(diff) * 2, 3);
                        arrowEl.innerHTML = `<span style="color:${color}; font-size:${size}em;">${symbol}</span>`;
                    }
                    priceMemory[pair.short] = p;

                    document.getElementById(pair.id).firstChild.textContent = p.toFixed(5);
                    
                    // Lock-in and Exit Targets
                    const sellZone = p + (p * vol);
                    const buyZone = p - (p * vol);
                    document.getElementById(`exits-${pair.short}`).innerHTML = `SELL CEILING: ${sellZone.toFixed(4)} | BUY FLOOR: ${buyZone.toFixed(4)}`;
                    
                    const boxEl = document.getElementById(`box-${pair.short}`);
                    boxEl.classList.remove('locked-short', 'locked-long');
                    if (p >= sellZone) boxEl.classList.add('locked-short');
                    else if (p <= buyZone) boxEl.classList.add('locked-long');
                }
            } catch (e) { console.error(e); }
        }

        function updateDashboard() {
            fetchAndCalculate({ sym: 'EUR/GBP', id: 'price-eur', short: 'eur' });
            fetchAndCalculate({ sym: 'USD/CHF', id: 'price-usd', short: 'usd' });
            fetchAndCalculate({ sym: 'NZD/USD', id: 'price-nzd', short: 'nzd' });
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
